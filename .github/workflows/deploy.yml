name: Deploy — SSH to Beelink

on:
  workflow_run:
    workflows: [ "CI — Lint + Build" ]
    branches: [ main ]
    types: [ completed ]

jobs:
  deploy:
    name: Deploy to Beelink VPS
    runs-on: ubuntu-latest
    # Apenas rodar se CI passou com sucesso
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH — Pull Imagem do GHCR
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BEELINK_HOST }}
          username: ${{ secrets.BEELINK_USER }}
          key: ${{ secrets.BEELINK_SSH_KEY }}
          script: |
            set -e

            echo "[*] Deploy iniciado em $(date)"

            # Navegar para o diretório da aplicação
            cd /opt/SDGNews || { echo "Diretório não encontrado"; exit 1; }

            # Verificar se Docker está rodando
            if ! docker ps &>/dev/null; then
              echo "[✗] Docker não está acessível. Verifique permissões do usuário vitor."
              exit 1
            fi

            # Autenticar no GitHub Container Registry (se privado)
            echo "[*] Autenticando no GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Puxar nova imagem
            echo "[*] Puxando nova imagem do GHCR..."
            docker compose -f /opt/SDGNews/docker-compose.yml pull

            # Limpar imagens antigos (opcional)
            echo "[*] Limpando imagens dangling..."
            docker image prune -f --filter "dangling=true" || true

            echo "[✓] Deploy concluído em $(date)"
            echo "[*] Nova imagem pronta!"
            echo "[*] Próxima execução do systemd timer: 06h30"

        env:
          CI: true

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BEELINK_HOST }}
          username: ${{ secrets.BEELINK_USER }}
          key: ${{ secrets.BEELINK_SSH_KEY }}
          script: |
            echo "[✗] Deploy falhou! Verifique os logs em:"
            echo "    https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
